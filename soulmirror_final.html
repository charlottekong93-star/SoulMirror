<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoulMirror — 个人复盘工具</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #FAF0FF;
      font-family: 'Noto Sans SC', sans-serif;
      color: #4A3F5C;
    }

    .sm-root { min-height: 100vh; position: relative; overflow-x: hidden; }

    /* ── 背景光球 ── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(70px);
      opacity: 0.5;
      animation: drift linear infinite;
      pointer-events: none;
      z-index: 0;
    }
    .orb1 { width: 420px; height: 420px; background: #FFB7C5; top: -80px; left: -100px; animation-duration: 18s; }
    .orb2 { width: 320px; height: 320px; background: #D5B8FF; top: 200px; right: -60px; animation-duration: 24s; animation-delay: -8s; }
    .orb3 { width: 260px; height: 260px; background: #B8D8FF; bottom: 100px; left: 30%; animation-duration: 20s; animation-delay: -4s; }
    .orb4 { width: 200px; height: 200px; background: #FFD6B8; bottom: -60px; right: 20%; animation-duration: 22s; animation-delay: -12s; }
    @keyframes drift {
      0%   { transform: translate(0,0) scale(1); }
      25%  { transform: translate(30px,-20px) scale(1.05); }
      50%  { transform: translate(15px,30px) scale(0.97); }
      75%  { transform: translate(-20px,10px) scale(1.03); }
      100% { transform: translate(0,0) scale(1); }
    }

    /* ── Header ── */
    .sm-header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(250,240,255,0.65);
      backdrop-filter: blur(20px);
      border-bottom: 0.5px solid rgba(210,180,255,0.3);
      padding: 14px 24px;
    }
    .sm-header-inner {
      max-width: 680px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
    }
    .sm-logo-wrap { display: flex; align-items: center; gap: 10px; }
    .sm-logo {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, #FFB7C5, #C8A0FF);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      position: relative;
      box-shadow: 0 4px 12px rgba(200,160,255,0.35);
      flex-shrink: 0;
    }
    .sm-logo::after {
      content: ''; position: absolute; inset: -4px; border-radius: 14px;
      border: 1.5px solid rgba(200,160,255,0.3);
      animation: pulse-ring 2.5s ease-in-out infinite;
    }
    @keyframes pulse-ring {
      0%,100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 0.9; transform: scale(1.08); }
    }
    .sm-logo svg { width: 18px; height: 18px; color: white; }
    .sm-brand {
      font-family: 'Noto Serif SC', serif; font-size: 17px; font-weight: 500;
      background: linear-gradient(135deg, #D27D8F, #9B6FCC);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .header-actions { display: flex; align-items: center; gap: 16px; }
    .header-btn {
      background: none; border: none; cursor: pointer;
      font-family: 'Noto Sans SC', sans-serif; font-size: 13px; font-weight: 400;
      color: #B09CC0; transition: color 0.25s;
      display: flex; align-items: center; gap: 5px;
    }
    .header-btn:hover { color: #9B6FCC; }
    .header-btn svg { width: 14px; height: 14px; }

    /* ── API Key 设置栏 ── */
    .api-bar {
      background: rgba(255,240,255,0.7);
      border-bottom: 0.5px solid rgba(200,160,255,0.25);
      padding: 10px 24px;
      display: flex; align-items: center; gap: 10px;
      position: relative; z-index: 99;
    }
    .api-bar-inner { max-width: 680px; margin: 0 auto; width: 100%; display: flex; align-items: center; gap: 10px; }
    .api-bar label { font-size: 12px; color: #B09CC0; white-space: nowrap; flex-shrink: 0; }
    .api-input {
      flex: 1; padding: 7px 14px; border-radius: 100px;
      border: 0.5px solid rgba(210,180,255,0.5);
      background: rgba(255,255,255,0.6);
      font-family: 'Noto Sans SC', sans-serif; font-size: 13px; color: #4A3F5C;
      outline: none; transition: border-color 0.3s, box-shadow 0.3s;
    }
    .api-input:focus { border-color: rgba(200,160,255,0.8); box-shadow: 0 0 0 3px rgba(200,160,255,0.1); }
    .api-input::placeholder { color: #D4C8E0; }
    .api-save-btn {
      padding: 7px 16px; border-radius: 100px; border: none; cursor: pointer;
      background: linear-gradient(135deg, #FFB7C5, #C8A0FF);
      color: white; font-family: 'Noto Sans SC', sans-serif; font-size: 12px; font-weight: 500;
      transition: all 0.3s; white-space: nowrap;
      box-shadow: 0 2px 8px rgba(200,160,255,0.3);
    }
    .api-save-btn:hover { box-shadow: 0 4px 14px rgba(200,160,255,0.5); transform: translateY(-1px); }
    .api-status { font-size: 12px; white-space: nowrap; }
    .api-status.ok { color: #7BC47B; }
    .api-status.none { color: #D4C8E0; }

    /* ── Main ── */
    .sm-main {
      max-width: 680px; margin: 0 auto;
      padding: 52px 24px 80px;
      position: relative; z-index: 1;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .sm-hero { margin-bottom: 36px; animation: fadeUp 0.85s cubic-bezier(0.22,1,0.36,1) both; }

    .wave-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 38px; font-weight: 500; line-height: 1.5;
      margin: 0 0 14px; display: block; cursor: default; user-select: none;
    }
    .wave-char {
      display: inline-block;
      background: linear-gradient(135deg, #D27D8F 0%, #9B6FCC 60%, #6F9BCC 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      line-height: 1.5;
    }
    .sm-hero p { font-size: 16px; line-height: 1.85; color: #7B6D8A; font-weight: 300; }

    /* ── Glass card ── */
    .glass-card {
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 0.5px solid rgba(255,255,255,0.9);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(180,140,210,0.12), 0 2px 8px rgba(180,140,210,0.07);
      transition: box-shadow 0.4s cubic-bezier(0.22,1,0.36,1), transform 0.4s cubic-bezier(0.22,1,0.36,1);
    }

    /* ── Input card ── */
    .sm-input-card { overflow: hidden; animation: fadeUp 0.85s cubic-bezier(0.22,1,0.36,1) 0.08s both; }
    .sm-textarea {
      width: 100%; height: 200px; padding: 28px;
      background: transparent; border: none; outline: none; resize: none;
      font-family: 'Noto Sans SC', sans-serif; font-size: 16px; line-height: 1.8; color: #4A3F5C;
    }
    .sm-textarea::placeholder { color: #C4B8D4; }
    .sm-input-footer {
      padding: 16px 28px;
      background: rgba(250,240,255,0.5);
      border-top: 0.5px solid rgba(210,180,255,0.22);
      display: flex; justify-content: space-between; align-items: center;
    }
    .sm-count { font-size: 12px; color: #C4B8D4; letter-spacing: 0.05em; }
    .sm-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 26px; border-radius: 100px; border: none; cursor: pointer;
      font-family: 'Noto Sans SC', sans-serif; font-size: 14px; font-weight: 500;
      background: linear-gradient(135deg, #FFB7C5, #C8A0FF); color: white;
      box-shadow: 0 4px 16px rgba(200,160,255,0.4);
      animation: breath 3s ease-in-out infinite;
      transition: all 0.35s cubic-bezier(0.22,1,0.36,1);
    }
    @keyframes breath {
      0%,100% { box-shadow: 0 4px 16px rgba(200,160,255,0.4); }
      50% { box-shadow: 0 6px 24px rgba(200,160,255,0.65); }
    }
    .sm-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(200,160,255,0.55); animation: none; }
    .sm-btn:active:not(:disabled) { transform: scale(0.97); }
    .sm-btn:disabled { opacity: 0.6; cursor: not-allowed; animation: none; }
    .sm-btn svg { width: 16px; height: 16px; }
    .spin { animation: spin 0.9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error ── */
    .error-box {
      margin-top: 16px; padding: 14px 20px; border-radius: 14px;
      background: rgba(255,200,200,0.25); border: 0.5px solid rgba(220,150,150,0.3);
      font-size: 14px; color: #C06070; line-height: 1.7;
      animation: fadeUp 0.4s ease both;
    }

    /* ── Results ── */
    .sm-results { margin-top: 48px; display: flex; flex-direction: column; gap: 20px; }

    .result-card { padding: 32px 36px; }
    .result-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 40px rgba(180,140,210,0.18), 0 4px 12px rgba(180,140,210,0.1);
    }

    .result-label {
      display: flex; align-items: center; gap: 8px;
      font-size: 17px; font-weight: 500; font-family: 'Noto Sans SC', sans-serif;
      color: #9B6FCC; margin-bottom: 20px; letter-spacing: 0.02em;
    }
    .result-label svg { width: 17px; height: 17px; flex-shrink: 0; }

    .body-text {
      font-size: 17px; line-height: 1.9; color: #5A4F6A;
      font-weight: 300; margin: 0; font-family: 'Noto Sans SC', sans-serif;
    }

    /* 引言卡片 */
    .quote-section {
      padding: 32px 36px; position: relative;
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 0.5px solid rgba(255,255,255,0.9); border-radius: 20px;
      box-shadow: 0 8px 32px rgba(180,140,210,0.12);
      transition: box-shadow 0.4s, transform 0.4s;
    }
    .quote-section:hover { transform: translateY(-3px); box-shadow: 0 16px 40px rgba(180,140,210,0.18); }
    .big-quote { position: absolute; top: 10px; left: 20px; font-size: 72px; line-height: 1; font-family: Georgia, serif; color: rgba(200,160,255,0.18); pointer-events: none; }
    .quote-text { font-family: 'Noto Serif SC', serif; font-size: 22px; font-weight: 400; line-height: 1.65; color: #9B6FCC; padding-left: 28px; font-style: italic; margin: 0; }

    /* 问题列表 */
    .question-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 16px 20px; border-radius: 14px;
      background: rgba(255,255,255,0.4); border: 0.5px solid rgba(210,180,255,0.2);
      margin-bottom: 10px; cursor: default;
      transition: all 0.35s cubic-bezier(0.22,1,0.36,1);
    }
    .question-item:last-child { margin-bottom: 0; }
    .question-item:hover { background: rgba(255,255,255,0.72); border-color: rgba(200,160,255,0.4); transform: translateX(4px); box-shadow: 0 4px 16px rgba(200,160,255,0.1); }
    .question-arrow { width: 17px; height: 17px; color: #C8A0FF; flex-shrink: 0; margin-top: 3px; }

    /* ── 聊天区 ── */
    .chat-messages {
      height: 280px; overflow-y: auto; padding: 20px 24px;
      display: flex; flex-direction: column; gap: 12px;
      background: rgba(250,245,255,0.35);
      border-top: 0.5px solid rgba(210,180,255,0.2);
      scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: rgba(200,160,255,0.25); border-radius: 2px; }

    .chat-empty {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; color: #C4B8D4; font-size: 14px; font-weight: 300; text-align: center; line-height: 1.8;
    }
    .chat-empty svg { width: 26px; height: 26px; opacity: 0.3; margin-bottom: 10px; }

    .msg-wrap { display: flex; }
    .msg-wrap.user { justify-content: flex-end; }
    .msg-wrap.ai { justify-content: flex-start; }

    .msg-bubble {
      max-width: 82%; padding: 12px 18px;
      font-size: 15px; font-weight: 300; line-height: 1.75;
      font-family: 'Noto Sans SC', sans-serif;
      animation: fadeUp 0.35s ease both;
    }
    .msg-bubble.user {
      background: linear-gradient(135deg, #FFB7C5, #C8A0FF); color: white;
      border-radius: 18px 18px 4px 18px;
      box-shadow: 0 2px 10px rgba(200,160,255,0.3);
    }
    .msg-bubble.ai {
      background: rgba(255,255,255,0.72); border: 0.5px solid rgba(210,180,255,0.3);
      color: #5A4F6A; border-radius: 18px 18px 18px 4px;
    }
    .typing-dot {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: #C8A0FF; margin: 0 2px;
      animation: typing-bounce 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing-bounce {
      0%,60%,100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    .chat-input-row {
      display: flex; gap: 10px; padding: 14px 16px;
      background: rgba(255,255,255,0.65);
      border-top: 0.5px solid rgba(210,180,255,0.18);
      border-radius: 0 0 20px 20px;
    }
    .chat-input {
      flex: 1; padding: 10px 18px; border-radius: 100px;
      border: 0.5px solid rgba(210,180,255,0.4);
      background: rgba(250,245,255,0.65);
      font-family: 'Noto Sans SC', sans-serif; font-size: 15px; color: #4A3F5C;
      outline: none; transition: border-color 0.3s, box-shadow 0.3s;
    }
    .chat-input:focus { border-color: rgba(200,160,255,0.7); box-shadow: 0 0 0 3px rgba(200,160,255,0.1); }
    .chat-input::placeholder { color: #C4B8D4; }
    .send-btn {
      width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer;
      background: linear-gradient(135deg, #FFB7C5, #C8A0FF); color: white;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.3s; box-shadow: 0 3px 10px rgba(200,160,255,0.35); flex-shrink: 0;
    }
    .send-btn:hover:not(:disabled) { transform: scale(1.08); box-shadow: 0 5px 16px rgba(200,160,255,0.5); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .send-btn svg { width: 15px; height: 15px; }

    /* ── 导出 & 分割线 ── */
    .export-btn {
      display: flex; align-items: center; gap: 6px; background: none;
      border: 0.5px solid rgba(210,180,255,0.4); border-radius: 100px;
      padding: 10px 22px; font-size: 15px; font-weight: 300; color: #C8A0FF;
      cursor: pointer; font-family: 'Noto Sans SC', sans-serif; transition: all 0.3s; margin: 4px auto 0;
    }
    .export-btn:hover { background: rgba(200,160,255,0.08); border-color: rgba(200,160,255,0.6); }
    .export-btn svg { width: 15px; height: 15px; }
    .section-divider { border: none; border-top: 0.5px solid rgba(210,180,255,0.22); margin: 4px 0; }

    /* ── 轮次提示 ── */
    .turn-hint {
      text-align: center; font-size: 12px; color: #C4B8D4;
      padding: 6px 0 2px; font-weight: 300; letter-spacing: 0.03em;
    }
  </style>
</head>
<body>
<div class="sm-root">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="orb orb4"></div>

  <!-- Header -->
  <header class="sm-header">
    <div class="sm-header-inner">
      <div class="sm-logo-wrap">
        <div class="sm-logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
        </div>
        <span class="sm-brand">SoulMirror</span>
      </div>
      <div class="header-actions" id="header-actions" style="display:none">
        <button class="header-btn" onclick="exportResult()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
          导出结果
        </button>
        <button class="header-btn" onclick="resetAll()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 109-9M3 3v6h6"/></svg>
          重新开始
        </button>
      </div>
    </div>
  </header>

  <!-- API Key 设置栏 -->
  <div class="api-bar" id="api-bar">
    <div class="api-bar-inner">
      <label for="api-key-input">Gemini API Key</label>
      <input class="api-input" type="password" id="api-key-input" placeholder="粘贴你的 Gemini API Key（AIza...）" autocomplete="off" />
      <button class="api-save-btn" onclick="saveApiKey()">保存</button>
      <span class="api-status none" id="api-status">未设置</span>
    </div>
  </div>

  <main class="sm-main">
    <!-- Hero -->
    <div class="sm-hero">
      <h2 class="wave-title" id="wave-title"></h2>
      <p>在这里放下你的日记、周记或随笔。<br>SoulMirror 会以温和的视角，陪你一起看见那些被忽略的情绪与转机。</p>
    </div>

    <!-- 输入区 -->
    <div class="glass-card sm-input-card" id="input-card">
      <textarea class="sm-textarea" id="diary-input" placeholder="今天发生了什么？或者，你最近在为什么感到困扰..." oninput="updateCount()"></textarea>
      <div class="sm-input-footer">
        <span class="sm-count" id="char-count">0 字</span>
        <button class="sm-btn" id="analyze-btn" onclick="analyze()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
          开始复盘
        </button>
      </div>
    </div>

    <!-- 错误提示 -->
    <div class="error-box" id="error-box" style="display:none"></div>

    <!-- 结果区 -->
    <div class="sm-results" id="results" style="display:none">

      <!-- 一句话引言 -->
      <div class="quote-section" id="result-quote">
        <div class="big-quote">"</div>
        <p class="quote-text" id="one-sentence"></p>
      </div>

      <!-- 内在回响 -->
      <div class="glass-card result-card" style="animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) 0.08s both">
        <div class="result-label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
          内在回响
        </div>
        <p class="body-text" id="result-summary"></p>
      </div>

      <!-- 微小尝试 -->
      <div class="glass-card result-card" style="animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) 0.16s both">
        <div class="result-label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
          微小尝试
        </div>
        <p class="body-text" id="result-insight"></p>
      </div>

      <!-- 留给你的问题 -->
      <div class="glass-card result-card" style="animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) 0.24s both">
        <div class="result-label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3M12 17h.01"/></svg>
          留给你的问题
        </div>
        <div id="result-questions"></div>
      </div>

      <!-- 导出按钮 -->
      <button class="export-btn" onclick="exportResult()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
        保存本次复盘结果
      </button>

      <hr class="section-divider">

      <!-- 与教练对话 -->
      <div class="glass-card" style="overflow:hidden; animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) 0.32s both">
        <div style="padding:28px 36px 20px">
          <div class="result-label" style="margin-bottom:4px">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
            与教练对话
          </div>
          <p class="turn-hint" id="turn-hint">对复盘有疑问，或想深入聊聊某个问题？</p>
        </div>

        <div class="chat-messages" id="chat-messages">
          <div class="chat-empty" id="chat-empty">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
            在这里直接告诉我吧。
          </div>
        </div>

        <div class="chat-input-row">
          <input class="chat-input" type="text" id="chat-input" placeholder="输入你的想法..." onkeydown="if(event.key==='Enter' && !event.isComposing) sendChat()" />
          <button class="send-btn" id="send-btn" onclick="sendChat()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>

    </div><!-- /results -->
  </main>
</div>

<script>
/* ============================================================
   全局状态
   ============================================================ */
var apiKey = localStorage.getItem('sm_api_key') || '';
var currentResult = null;
var diaryContent = '';
var chatHistory = [];   // [{role:'user'|'model', content:'...'}]
var isChatLoading = false;

/* ── Prompts（与原版完全一致）── */
var SYSTEM_INSTRUCTION = `你是一位极具同理心的人格教练，你的核心任务是通过分析用户上传的内容，进行合理且贴近人性的洞察，并给出具体可执行的建议。禁止输出空泛、正确但无用的话。

【全局规则】
1. 整体输出必须像"同一个人在连续说话"，而不是四个独立模块拼接。
2. 所有内容必须围绕同一个核心状态展开，不允许每一部分各说各话。
3. 避免使用抽象、概念化表达（如"模式""系统""结构"），优先使用具体体验或感受类语言。
4. 语气保持克制、温和、有人感，可以使用"好像""有一点""似乎"等表达，避免绝对判断。
5. 不进行说教、不下结论、不贴标签。

【one_sentence 生成规则】
1. 通过描述一个状态、画面或感受，引发共鸣。
2. 不使用"你是/你正在"等直接定义句式。
3. 允许留白，不解释原因。
4. 控制在30字以内，语言尽量简单自然。
5. 这一句话需要为后续 summary 提供情绪起点。
6. 如果用户文本中出现具体场景，输出中的场景必须从这些已出现的场景中选择或延伸，不得新增完全无关的环境。
7. 如果需要生成场景描述，必须使用用户文本中已有的环境类型，禁止使用自然景观隐喻作为主要场景。
8. 如果用户文本中没有明确场景，则只能使用"日常可感知动作"来构建画面，不得使用宏大或远距离隐喻。

【summary 生成规则】
1. 不重复表层事件，而是解释"为什么会这样"，聚焦内在动机或状态。
2. 必须指出一个"卡住点"或"拉扯感"，但避免评判或绝对化表达。
3. 内容必须承接 one_sentence，像是在把那句话慢慢展开，而不是开启新话题。
4. 使用具体体验语言（如卡住、反复、消耗、拧巴），避免抽象概念。
5. 如果用户文本中出现自我评价或自我对话句，必须单独提取并回应。

【insight 生成规则】
1. 所有建议必须直接回应 summary 中的"卡住点"，不得脱节。
2. 每条建议必须是"顺着上文自然延伸出的下一步"，而不是新方向。
3. 每条建议尽量包含：一个具体动作、一个触发场景、一个微小反馈。
4. 优先提供"当下可以尝试的一步"，避免宏大目标。
5. 使用非命令式表达（如"可以试试…""也许可以…"）。
6. 建议数量控制在1-2条。

【questions 生成规则】
1. 所有问题必须基于 summary 或 insight 中的具体内容生成，不引入新话题。
2. 每个问题必须指向一个具体的回避点、矛盾或未面对的选择。
3. 使用贴近真实思考的表达（如"有没有发现…""是不是有一点…"）。
4. 输出2-3个问题，其中至少1个指向行为层，至少1个指向动机层。

必须严格按照 JSON 格式输出，结构为：{"one_sentence":"...","summary":"...","insight":"...","questions":["...","..."]}`;

var CHAT_SYSTEM_INSTRUCTION = `你是一位极具同理心的人格教练。用户刚刚完成了一次复盘，现在他/她想就复盘结果或你提出的问题与你进一步交流。

你的任务是：
1. 保持温和、克制且充满同理心的语气。
2. 像朋友一样对话，避免说教。
3. 引导用户深入思考，而不是直接给答案。
4. 所有的对话都应基于之前的复盘背景。
5. 当对话回数大于三次时，基于之前的复盘背景和这个对话框的内容，融合成一段总结性文字，目标是导向给到用户中肯的结论，避免进入无限次的问答。
6. 尽量简短有力，每次回复控制在 200 字以内。`;

/* ============================================================
   初始化
   ============================================================ */
window.addEventListener('DOMContentLoaded', function () {
  buildWaveTitle();
  initApiBar();
});

/* ── 波浪标题 ── */
function buildWaveTitle() {
  var titleText = '倾听你的内心回响';
  var titleEl = document.getElementById('wave-title');
  var chars = [], waveAmps = [], wavePhases = [], isHovering = false, waveRAF = null;

  titleText.split('').forEach(function (ch) {
    var span = document.createElement('span');
    span.className = 'wave-char';
    span.textContent = ch;
    titleEl.appendChild(span);
    chars.push(span);
  });

  chars.forEach(function (_, i) { waveAmps.push(0); wavePhases.push(i * 0.45); });

  function loop() {
    chars.forEach(function (span, i) {
      waveAmps[i] += ((isHovering ? 7 : 0) - waveAmps[i]) * 0.06;
      wavePhases[i] += 0.055;
      span.style.transform = 'translateY(' + (waveAmps[i] * Math.sin(wavePhases[i])).toFixed(2) + 'px)';
    });
    var done = !isHovering && waveAmps.every(function (a) { return Math.abs(a) < 0.15; });
    if (done) { chars.forEach(function (s) { s.style.transform = ''; }); waveRAF = null; return; }
    waveRAF = requestAnimationFrame(loop);
  }

  titleEl.addEventListener('mouseenter', function () { isHovering = true; if (!waveRAF) waveRAF = requestAnimationFrame(loop); });
  titleEl.addEventListener('mouseleave', function () { isHovering = false; if (!waveRAF) waveRAF = requestAnimationFrame(loop); });
}

/* ── API Key 初始化 ── */
function initApiBar() {
  if (apiKey) {
    document.getElementById('api-key-input').value = apiKey;
    setApiStatus(true);
  }
}

function saveApiKey() {
  var val = document.getElementById('api-key-input').value.trim();
  if (!val) { setApiStatus(false); return; }
  apiKey = val;
  localStorage.setItem('sm_api_key', apiKey);
  setApiStatus(true);
}

function setApiStatus(ok) {
  var el = document.getElementById('api-status');
  if (ok) { el.textContent = '✓ 已就绪'; el.className = 'api-status ok'; }
  else     { el.textContent = '未设置';   el.className = 'api-status none'; }
}

/* ── 字数统计 ── */
function updateCount() {
  document.getElementById('char-count').textContent = document.getElementById('diary-input').value.length + ' 字';
}

/* ============================================================
   核心：分析日记（调用 Gemini API）
   ============================================================ */
async function analyze() {
  if (location.protocol === 'file:') {
    showError('⚠️ 当前以文件方式打开，浏览器安全限制无法调用 API。请打开终端运行：cd ~/Downloads && python3 -m http.server 8080，然后浏览器访问 http://localhost:8080/soulmirror_final.html');
    return;
  }
  var content = document.getElementById('diary-input').value.trim();
  if (!content) { document.getElementById('diary-input').placeholder = '请先写点什么再开始复盘 ✨'; return; }

  if (!apiKey) { showError('请先在顶部输入并保存你的 Gemini API Key。'); return; }

  setAnalyzeLoading(true);
  hideError();

  try {
    var result = await callGeminiAnalyze(content);
    diaryContent = content;
    currentResult = result;
    chatHistory = [];
    renderResults(result);
  } catch (e) {
    showError(e.message || '分析失败，请稍后再试。');
  } finally {
    setAnalyzeLoading(false);
  }
}

async function callGeminiAnalyze(content, retry) {
  var models = ['gemini-2.5-flash', 'gemini-2.0-flash', 'gemini-2.0-flash-lite'];
  var modelIndex = retry || 0;
  var model = models[Math.min(modelIndex, models.length - 1)];
  var url = 'https://generativelanguage.googleapis.com/v1beta/models/' + model + ':generateContent?key=' + apiKey;

  var jsonPrompt = content + '\n\n请严格按照以下 JSON 格式输出，不要有任何其他文字：\n{"one_sentence":"...","summary":"...","insight":"...","questions":["...","...","..."]}';

  var body = {
    system_instruction: { parts: [{ text: SYSTEM_INSTRUCTION }] },
    contents: [{ role: 'user', parts: [{ text: jsonPrompt }] }],
    generationConfig: { temperature: 0.9, maxOutputTokens: 2048 }
  };

  var res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });

  if (!res.ok) {
    var err = await res.json().catch(function(){return {};});
    var msg = (err.error && err.error.message) || res.statusText;
    if (res.status === 429 || res.status === 503) {
      if (!retry || retry < 2) {
        var waitSec = retry === 1 ? 10 : 5;
        setAnalyzeLoadingMsg('服务繁忙，' + waitSec + ' 秒后自动重试...');
        await new Promise(function(r){ setTimeout(r, waitSec * 1000); });
        return callGeminiAnalyze(content, (retry || 0) + 1);
      }
      throw new Error('服务目前繁忙，请稍等 1 分钟后再试。');
    }
    throw new Error('请求失败（' + res.status + '）：' + msg);
  }

  var data = await res.json();
  var text = data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0].text;
  if (!text) throw new Error('AI 返回了空内容，请重试。');

  // 提取 JSON（模型可能在 JSON 前后加文字）
  var match = text.match(/\{[\s\S]*\}/);
  if (!match) throw new Error('AI 返回格式异常，请重试。');
  try {
    return JSON.parse(match[0]);
  } catch(e) {
    throw new Error('解析 AI 返回内容失败，请重试。');
  }
}

/* ============================================================
   核心：聊天（调用 Gemini API）
   ============================================================ */
async function sendChat() {
  if (isChatLoading || !currentResult) return;
  var input = document.getElementById('chat-input');
  var text = input.value.trim();
  if (!text) return;
  if (!apiKey) { showError('请先设置 API Key。'); return; }

  input.value = '';
  appendMsg('user', text);
  chatHistory.push({ role: 'user', content: text });

  isChatLoading = true;
  document.getElementById('send-btn').disabled = true;

  var turnCount = chatHistory.filter(function(m){ return m.role === 'user'; }).length;
  updateTurnHint(turnCount);

  var typingEl = appendTyping();

  try {
    var reply = await callGeminiChat(text, turnCount);
    typingEl.remove();
    appendMsg('ai', reply);
    chatHistory.push({ role: 'model', content: reply });
  } catch (e) {
    typingEl.remove();
    appendMsg('ai', '抱歉，对话暂时失败：' + (e.message || '请稍后再试'));
  } finally {
    isChatLoading = false;
    document.getElementById('send-btn').disabled = false;
  }
}

async function callGeminiChat(message, turnCount, retry) {
  var url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + apiKey;

  var context = '用户日记：' + diaryContent +
    '\n\n分析结果：\n一句话：' + currentResult.one_sentence +
    '\n内在回响：' + currentResult.summary +
    '\n微小尝试：' + currentResult.insight +
    '\n留给你的问题：' + currentResult.questions.join('、');

  var sysPrompt = CHAT_SYSTEM_INSTRUCTION +
    '\n\n【当前复盘背景】\n' + context +
    '\n\n【当前对话状态】\n- 当前是第 ' + turnCount + ' 轮对话。' +
    (turnCount > 3 ? '注意：对话已超过3轮，请开始融合背景与对话内容，给出中肯结论并优雅地结束问答。' : '');

  var contents = chatHistory.slice(0, -1).map(function(m) {
    return { role: m.role, parts: [{ text: m.content }] };
  });
  contents.push({ role: 'user', parts: [{ text: message }] });

  var body = {
    system_instruction: { parts: [{ text: sysPrompt }] },
    contents: contents
  };

  var res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  if (!res.ok) {
    var err = await res.json().catch(function(){return {};});
    if (res.status === 429 && (!retry || retry < 2)) {
      await new Promise(function(r){ setTimeout(r, 5000); });
      return callGeminiChat(message, turnCount, (retry || 0) + 1);
    }
    throw new Error((err.error && err.error.message) || '请求失败（' + res.status + '）');
  }

  var data = await res.json();
  return data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0].text || '抱歉，我暂时没有回应，请再试一次。';
}

/* ============================================================
   渲染结果
   ============================================================ */
function renderResults(result) {
  document.getElementById('one-sentence').textContent = result.one_sentence;
  document.getElementById('result-summary').textContent = result.summary;
  document.getElementById('result-insight').textContent = result.insight;

  var qContainer = document.getElementById('result-questions');
  qContainer.innerHTML = '';
  result.questions.forEach(function(q) {
    var div = document.createElement('div');
    div.className = 'question-item';
    div.innerHTML = '<svg class="question-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg><p class="body-text" style="margin:0">' + escHtml(q) + '</p>';
    qContainer.appendChild(div);
  });

  document.getElementById('results').style.display = 'flex';
  document.getElementById('header-actions').style.display = 'flex';
  document.getElementById('chat-messages').innerHTML = '<div class="chat-empty" id="chat-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>在这里直接告诉我吧。</div>';

  setTimeout(function() { document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 120);
}

/* ============================================================
   聊天 UI 辅助
   ============================================================ */
function appendMsg(role, text) {
  var container = document.getElementById('chat-messages');
  var empty = document.getElementById('chat-empty');
  if (empty) empty.remove();

  var wrap = document.createElement('div');
  wrap.className = 'msg-wrap ' + role;
  var bubble = document.createElement('div');
  bubble.className = 'msg-bubble ' + role;
  bubble.textContent = text;
  wrap.appendChild(bubble);
  container.appendChild(wrap);
  container.scrollTop = container.scrollHeight;
  return wrap;
}

function appendTyping() {
  var container = document.getElementById('chat-messages');
  var empty = document.getElementById('chat-empty');
  if (empty) empty.remove();

  var wrap = document.createElement('div');
  wrap.className = 'msg-wrap ai';
  wrap.innerHTML = '<div class="msg-bubble ai" style="padding:14px 18px"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>';
  container.appendChild(wrap);
  container.scrollTop = container.scrollHeight;
  return wrap;
}

function updateTurnHint(turn) {
  var hint = document.getElementById('turn-hint');
  if (turn <= 3) { hint.textContent = '第 ' + turn + ' 轮对话 · 可继续深入'; }
  else { hint.textContent = '对话即将收尾，教练会给你一段综合小结'; }
}

/* ============================================================
   导出 & 重置
   ============================================================ */
function exportResult() {
  if (!currentResult) return;
  var lines = [
    '# SoulMirror 复盘结果',
    '时间：' + new Date().toLocaleString(),
    '',
    '## 内在回响（一句话）',
    currentResult.one_sentence,
    '',
    '## 深度剖析',
    currentResult.summary,
    '',
    '## 微小尝试',
    currentResult.insight,
    '',
    '## 留给你的问题',
    currentResult.questions.map(function(q, i){ return (i+1) + '. ' + q; }).join('\n'),
  ];
  if (chatHistory.length > 0) {
    lines.push('', '## 对话记录');
    chatHistory.forEach(function(m) {
      lines.push((m.role === 'user' ? '我：' : '教练：') + m.content);
    });
  }
  var blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'SoulMirror_复盘_' + new Date().toLocaleDateString() + '.txt';
  a.click();
}

function resetAll() {
  currentResult = null; diaryContent = ''; chatHistory = [];
  document.getElementById('diary-input').value = '';
  document.getElementById('char-count').textContent = '0 字';
  document.getElementById('results').style.display = 'none';
  document.getElementById('header-actions').style.display = 'none';
  hideError();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ============================================================
   状态辅助
   ============================================================ */
function setAnalyzeLoading(on) {
  var btn = document.getElementById('analyze-btn');
  if (on) {
    btn.disabled = true;
    btn.innerHTML = '<svg class="spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>正在洞察...';
  } else {
    btn.disabled = false;
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>开始复盘';
  }
}

function setAnalyzeLoadingMsg(msg) {
  var btn = document.getElementById('analyze-btn');
  btn.disabled = true;
  btn.innerHTML = '<svg class="spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>' + msg;
}

function showError(msg) { var el = document.getElementById('error-box'); el.textContent = msg; el.style.display = 'block'; }
function hideError()    { document.getElementById('error-box').style.display = 'none'; }
function escHtml(s)     { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
